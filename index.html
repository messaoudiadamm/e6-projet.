<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page d'accueil Messaoudi Adamm</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #F5F5F5;
      margin: 0;
      color: #333;
    }
    .header {
      margin-bottom: 50px;
      text-align: center;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 30px;
    }
    .container {
      display: flex;
      gap: 25px;
    }
    button {
      background-color: #222;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    button:hover {
      background-color: #444;
      transform: translateY(-3px);
      box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
    }
    button:active {
      transform: translateY(0);
    }
    a {
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #888;
    }
    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }
      .header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Adamm Messaoudi</h1>
    <p>BTS SIO 2025 - SLAM</p>
  </div>
  <div class="container">
    <button>
      <a href="/Portfolio/porfolio.html">
        Portfolio
      </a>
    </button>
    <button>
      <a href="https://gold-goldfish-522043.hostingersite.com/clientLeger/">
        Client Léger
      </a>
    </button>
    <button>
      <a href="https://drive.google.com/drive/u/0/folders/1HJ84s0_-j7L3KHJ1S6lY9YnOz0Soql4Z">
        Documentation ClientLeger
      </a>
    </button>
    <button>
      <a href="https://drive.google.com/drive/u/0/folders/1jJ3PlQBrmy9AVPK-b1MlJgwnmVj4LK8F">
        Documentation ClientLourd
      </a>
    </button>
  </div>
  <div class="footer">
    &copy; 2025 Adamm Messaoudi - Tous droits réservés
  </div>
</body>
</html>
